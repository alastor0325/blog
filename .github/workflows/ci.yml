name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  js-tests:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: npm test

  jekyll-build:
    name: Jekyll build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build site
        run: bundle exec jekyll build
      - name: Test rendered layout
        run: npm run test:build
